# Crosswalk: Credential Commons  ->  European Learning Model (ELM / Europass, elm:)
# https://europa.eu/europass/elm-browser/
# Status: starter mapping, v0.1.
standard: ELM
namespace: "http://data.europa.eu/snb/model/elm/"
prefix: elm
maps:
  - cc: cc:MicroCredential
    target: elm:LearningAchievementSpecification
    confidence: medium
    note: "ELM models a micro-credential as a LearningAchievementSpecification + awardingBody."
  - cc: schema:name
    target: elm:title
    confidence: high
  - cc: schema:description
    target: elm:description
    confidence: high
  - cc: schema:url
    target: elm:homepage
    confidence: medium
  - cc: schema:provider
    target: elm:awardingBody
    confidence: high
  - cc: cc:ectsCredits
    target: elm:creditPoint
    confidence: high
    note: "ELM creditPoint with framework=ECTS."
  - cc: cc:learningOutcome
    target: elm:learningOutcome
    confidence: high
  - cc: dcterms:language
    target: elm:language
    confidence: high
  - cc: cc:Curriculum
    target: elm:LearningAchievementSpecification
    confidence: medium
  - cc: cc:clockHours
    target: elm:volumeOfLearning
    confidence: high
    note: "ELM volumeOfLearning is an ISO-8601 duration; clock (60-min) hours convert directly."
  - cc: cc:academicHours
    target: elm:volumeOfLearning
    confidence: medium
    note: "Estonia Töötukassa unit (45-min); convert to a duration before mapping."
  - cc: cc:entryRequirements
    target: elm:entryRequirement
    confidence: high
  - cc: cc:awardedCredential
    target: elm:awardingOpportunity
    confidence: low
